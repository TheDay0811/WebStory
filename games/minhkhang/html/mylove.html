<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Nền màu đen */
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .play-btn {
            background: transparent;
            border: 2px solid #D4AF37; /* Viền vàng gold */
            color: #D4AF37;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .play-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        .play-btn svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
            margin-left: 5px; /* Căn giữa icon play (vì tam giác lệch phải) */
        }

        .back-btn {
            position: absolute;
            bottom: 40px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 30px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            border-radius: 4px;
        }

        .back-btn:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Trạng thái khi đang phát nhạc */
        .play-btn.playing svg {
            margin-left: 0; /* Trả về mặc định cho icon pause */
        }
    </style>
</head>
<body>

    <!-- Thay src bằng file audio thực tế của bạn -->
    <audio id="myAudio" loop>
        <source src="../sound/mylove_audio.mp3" type="audio/mpeg">
    </audio>

    <!-- Nút phát audio -->
    <button class="play-btn" id="playAudioBtn">
        <!-- Icon Play -->
        <svg viewBox="0 0 24 24" id="playIcon">
            <path d="M8 5v14l11-7z"/>
        </svg>
        <!-- Icon Pause (ẩn ban đầu) -->
        <svg viewBox="0 0 24 24" id="pauseIcon" style="display: none;">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
    </button>

    <!-- Nút quay lại trang menu -->
    <a href="menu.html" class="back-btn">Trở về</a>

    <script>
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playAudioBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                // Bắt đầu phát
                audio.play().catch(error => console.log("Lỗi phát nhạc:", error));
                playBtn.classList.add('playing');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                // Dừng phát
                audio.pause();
                playBtn.classList.remove('playing');
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        });

        // Xử lý khi audio kết thúc (nếu không để loop)
        audio.addEventListener('ended', () => {
            playBtn.classList.remove('playing');
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });
    </script>
</body>
</html>
