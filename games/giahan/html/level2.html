<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thế Giới Của Gia Hân - Màn 2</title>
    <!-- Nhúng Font chuẩn Scrapbook -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Montserrat:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../image/sói.png">
</head>

<body>
    <div class="scrapbook-container">

        <!-- SECTION 1: QUYÊN (Hình chim cánh cụt) -->
        <section class="flex-row items-center mg-bottom-large padding-h-mobile">
            <div class="col-50">
                <h2 class="serif-font section-title" style="margin-left: 20px; text-align: left;">Quyên</h2>
                <div class="polaroid drawn-border-red tilt-left">
                    <!-- Đợi ảnh Chim cánh cụt màu xanh -->
                    <img src="../image/quyen.png" alt="Chim cánh cụt Quyên">
                </div>
            </div>
            <div class="col-50 text-center desc-box">
                <p class="regular-text">
                    chịu luôn ,khang ơi bớt đổ<br>
                    thừa em quyên của t lại, m<br>
                    mất bóp liên quan j bạn t,<br>
                    bằng chứng đâu
                </p>
            </div>
        </section>

        <!-- SECTION 2: THÁI (Hình mèo cuộn len) -->
        <!-- Để khoảng cách xa một chút giống bố cục sổ tay -->
        <section class="flex-row items-center reverse-mobile padding-h-mobile" style="margin-bottom: 200px;">
            <div class="col-50 text-center desc-box tilt-right">
                <p class="regular-text" style="text-align: right; margin-right: 50px; margin-bottom: 0;">
                    Thái<br>
                    <span style="font-size: 2rem; color: #e1251b;">&#8594;</span> <!-- Mũi tên đỏ trỏ vào Mèo -->
                </p>
                <div class="polaroid tilt-right">
                    <!-- Đợi ảnh em bé mèo ngây thơ -->
                    <img src="../image/thai.png" alt="Thái Mèo">
                </div>
            </div>
            <div class="col-50 text-center desc-box">
                <p class="regular-text" style="text-align: center;">
                    hôm nay an ở lại<br>
                    trực nhật hỏi thử đi
                </p>
            </div>
        </section>

        <!-- SECTION 3: KẾT THÚC DRAMA TRANH LỜI -->
        <!-- Tạo một phân đoạn trống xuống dưới tuốt như cái ảnh số 2 -->
        <section class="text-center mg-bottom-large" style="padding-top: 100px;">
            <h3 class="serif-font big-quote">Quyên Chị trả<br>thù cho em rồi</h3>
        </section>

        <!-- Nút PLAY chuyển sang phần tiếp theo -->
        <section class="text-right padding-h-mobile" style="padding-bottom: 100px;">
            <button id="play-btn-2" class="serif-font play-btn">Play -></button>
        </section>

    </div>

    <!-- Tích hợp Engine điều hướng -->
    <script src="../js/level2.js"></script>
</body>

</html>
