<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vườn Truyện - Chi tiết truyện</title>
    <meta name="description" content="Xem chi tiết và đọc truyện trên Vườn Truyện.">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="header-logo">Vườn Truyện</a>
            <nav class="header-nav">
                <a href="index.html">Trang Chủ</a>
                <a href="library.html" class="active">Thư Viện</a>
                <a href="index.html#genres">Thể Loại</a>
            </nav>
            <div class="header-actions">
                <button class="icon-btn" title="Thông báo">
                    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </button>
                <div class="header-avatar" title="Thiên An">A</div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="detail-page">

            <!-- TOP: Cover + Content -->
            <div class="detail-top">
                <!-- Left: Cover & Info -->
                <div class="detail-cover-col">
                    <div class="detail-cover">
                        <img id="detailCover" src="" alt="Book Cover">
                    </div>
                    <div class="detail-info-card">
                        <h4>Thông Tin</h4>
                        <div class="detail-info-row">
                            <span class="detail-info-label">Thể loại</span>
                            <span class="detail-info-value" id="detailGenres"></span>
                        </div>
                        <div class="detail-info-row">
                            <span class="detail-info-label">Năm</span>
                            <span class="detail-info-value" id="detailYear"></span>
                        </div>
                        <div class="detail-info-row">
                            <span class="detail-info-label">Trạng thái</span>
                            <span class="detail-info-value" id="detailStatus"></span>
                        </div>
                    </div>
                    <div id="detailQuoteSection">
                        <p class="detail-quote" id="detailQuote"></p>
                        <p class="detail-quote-author" id="detailQuoteAuthor"></p>
                    </div>
                </div>

                <!-- Right: Title, Summary, Chapters -->
                <div class="detail-content-col">
                    <p class="detail-genre-tag" id="detailGenreTag"></p>
                    <h1 class="detail-title" id="detailTitle"></h1>
                    <div class="detail-meta">
                        <span class="detail-author" id="detailAuthor"></span>
                        <span class="detail-rating" id="detailRating"></span>
                    </div>
                    <div class="detail-actions">
                        <button class="btn-primary" id="btnRead">Đọc ngay</button>
                        <button class="btn-outline" id="btnSave">Lưu vào thư viện</button>
                    </div>

                    <!-- Summary -->
                    <p class="detail-summary-label">Tóm Tắt</p>
                    <div class="detail-summary" id="detailSummary"></div>

                    <!-- Chapter List -->
                    <div class="chapter-header">
                        <span class="chapter-header-title">Mục Lục</span>
                        <span class="chapter-count" id="chapterCount"></span>
                    </div>
                    <div class="chapter-list" id="chapterList"></div>
                    <div class="chapter-view-all" id="viewAllChapters">Xem Tất Cả Chương</div>
                </div>
            </div>

        </div>
    </div>

    <!-- Recommendations -->
    <div class="container">
        <section class="recommend-section">
            <p class="recommend-label">Bạn cũng có thể thích</p>
            <div class="recommend-grid" id="recommendGrid"></div>
        </section>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <div class="footer-logo">Vườn Truyện</div>
                    <p class="footer-desc">Nơi nuôi dưỡng tâm hồn qua những trang viết tình tuyện.</p>
                    <p class="footer-copy">© 2024 Vườn Truyện.</p>
                </div>
                <div class="footer-links">
                    <a href="#" class="footer-link">Về Chúng Tôi</a>
                    <a href="#" class="footer-link">Điều Khoản</a>
                    <a href="#" class="footer-link">Bảo Mật</a>
                    <a href="#" class="footer-link">Liên Hệ</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/story.js"></script>
</body>
</html>
