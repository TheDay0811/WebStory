<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vườn Truyện - Trang chủ</title>
    <meta name="description" content="Vườn Truyện - Nơi nuôi dưỡng tâm hồn qua những trang viết tình tuyện.">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header" id="header">
        <div class="header-inner">
            <a href="index.html" class="header-logo">Vườn Truyện</a>
            <nav class="header-nav">
                <a href="index.html" class="active">Trang Chủ</a>
                <a href="library.html">Thư Viện</a>
                <a href="#genres" id="nav-categories">Thể Loại</a>
            </nav>
            <div class="header-actions">
                <div class="header-search">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" placeholder="Tìm truyện..." id="searchInput">
                </div>
                <button class="icon-btn" title="Thông báo">
                    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </button>
                <div class="header-avatar" title="Thiên An">A</div>
            </div>
        </div>
    </header>

    <div class="container">

        <!-- HERO: FEATURED SPOTLIGHT -->
        <section class="hero" id="hero">
            <div class="hero-content">
                <div class="hero-label">Featured Spotlight</div>
                <h1 class="hero-title" id="featuredTitle"></h1>
                <p class="hero-desc" id="featuredDesc"></p>
                <div class="hero-actions">
                    <a href="#" class="btn-read" id="featuredRead">Đọc ngay →</a>
                    <a href="#" class="btn-detail" id="featuredDetail">Xem chi tiết</a>
                </div>
            </div>
            <div class="hero-image">
                <img id="featuredImage" src="" alt="Featured Story">
            </div>
        </section>

        <!-- RECENTLY UPDATED + RANKING -->
        <section class="content-split">
            <div class="content-main">
                <div class="section-header">
                    <h2 class="section-title">Mới cập nhật</h2>
                    <a href="#" class="section-link">Tất cả</a>
                </div>
                <div class="story-grid" id="storyGrid"></div>
            </div>
            <div class="content-side">
                <div class="section-header">
                    <h2 class="section-title">Bảng xếp hạng</h2>
                    <div class="ranking-tabs">
                        <span class="ranking-tab active" data-tab="week">Tuần</span>
                        <span class="ranking-tab" data-tab="month">Tháng</span>
                    </div>
                </div>
                <div class="ranking-list" id="rankingList"></div>
            </div>
        </section>

        <!-- GENRES -->
        <section class="genres-section" id="genres">
            <div class="section-header">
                <h2 class="section-title">Thể loại</h2>
            </div>
            <div class="genre-tags" id="genreTags"></div>
        </section>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <div class="footer-logo">Vườn Truyện</div>
                    <p class="footer-desc">Nơi nuôi dưỡng tâm hồn qua những trang viết tình tuyện.</p>
                    <p class="footer-copy">© 2024 Vườn Truyện.</p>
                </div>
                <div class="footer-links">
                    <a href="#" class="footer-link">Về Chúng Tôi</a>
                    <a href="#" class="footer-link">Điều Khoản</a>
                    <a href="#" class="footer-link">Bảo Mật</a>
                    <a href="#" class="footer-link">Liên Hệ</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
