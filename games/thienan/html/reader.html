            <a href="story.html?id=1" class="icon-btn" title="Đóng">

            </a>
        </div>
    </header>

    <!-- READER CONTENT -->
    <div class="reader-content">
        <!-- Meta -->
        <div class="reader-meta">
            <p class="reader-genre" id="readerGenre"></p>
            <p class="reader-book-title" id="readerBookTitle"></p>
            <h1 class="reader-chapter-title" id="readerChapterTitle"></h1>
            <p class="reader-chapter-num" id="readerChapterNum"></p>
        </div>

        <!-- Body -->
        <div class="reader-body" id="readerBody"></div>

        <!-- Chapter Navigation -->
        <div class="reader-nav">
            <div class="reader-nav-item" id="prevChapter">
                <div class="reader-nav-label">Trước</div>
                <div class="reader-nav-title" id="prevTitle"></div>
            </div>
            <div class="reader-nav-center" title="Danh sách chương">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>

        <div class="reader-footer-links">

            <a href="#" class="reader-footer-link">Điều khoản</a>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/reader.js"></script>
</body>
</html>
