<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY - Welcome Back</title>
    <!-- Nhúng Font từ Google Fonts đúng với thiết kế -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Nhúng CSS -->
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <!-- Lớp phủ làm tối background sách -->
    <div class="background-overlay"></div>

    <!-- Logo góc trên cùng -->
    <div class="top-logo">STORY</div>

    <!-- Container chính -->
    <div class="login-container">
        <h1 class="main-title">STORY</h1>
        <p class="subtitle">Welcome back.</p>

        <div class="login-box">
            <div class="input-group">
                <label for="account">ACCOUNT</label>
                <input type="text" id="account" placeholder="Username" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" placeholder="Password">
            </div>
            <button id="login-btn" class="login-btn">LOGIN</button>
        </div>
    </div>

    <!-- Footer tác giả + nút QR ủng hộ -->
    <div class="author-footer">
        <span class="author-name">THEDAY</span>
        <button id="qr-btn" class="qr-btn" title="Ủng hộ tác giả"
            onclick="document.getElementById('qr-modal').classList.add('active')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none" />
                <rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none" />
                <rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none" />
                <path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 20h3" />
            </svg>
        </button>
    </div>

    <!-- Modal QR Code -->
    <div id="qr-modal" class="qr-modal" onclick="if(event.target===this)this.classList.remove('active')">
        <div class="qr-popup">
            <button class="qr-close"
                onclick="document.getElementById('qr-modal').classList.remove('active')">&times;</button>
            <p class="qr-label">Ủng hộ tác giả ☕</p>
            <div class="qr-img-wrap">
                <img src="../image/qr.png" alt="QR ủng hộ" class="qr-img"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="qr-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="160" height="160">
                        <rect width="100" height="100" fill="#1a1a1a" rx="8" />
                    </svg>
                </div>
            </div>
            <p class="qr-note">Cảm ơn bạn đã ủng hộ! 💙</p>
        </div>
    </div>

    <!-- Nhúng CSDL nội bộ -->
    <script src="../data/accounts.js"></script>
    <!-- Nhúng JS logic -->
    <script src="../js/login.js"></script>
</body>

</html>
